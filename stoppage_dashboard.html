<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Long Stoppage Intelligence Dashboard</title>
<script src="https://unpkg.com/deck.gl@8.9.36/dist.min.js"></script>
<script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#0a0e17;color:#e0e6ed;overflow:hidden}
#map{position:absolute;top:0;left:0;width:100%;height:100%}

.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:linear-gradient(135deg,#0d1117,#161b22);
  border-bottom:1px solid #21262d;
  padding:10px 24px;display:flex;align-items:center;justify-content:space-between;
}
.header h1{font-size:17px;font-weight:600;color:#f0f6fc;letter-spacing:-0.3px}
.header h1 span{color:#f85149}
.kpi-strip{display:flex;gap:20px;align-items:center}
.kpi{text-align:center;padding:0 14px;border-right:1px solid #21262d}
.kpi:last-child{border-right:none}
.kpi-value{font-size:20px;font-weight:700;line-height:1.2}
.kpi-label{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:#8b949e;margin-top:1px}
.kpi-risk .kpi-value{color:#f85149}
.kpi-safe .kpi-value{color:#3fb950}
.kpi-total .kpi-value{color:#58a6ff}
.kpi-time .kpi-value{color:#d2a8ff}

.controls{
  position:fixed;top:58px;left:14px;z-index:100;
  background:rgba(13,17,23,0.94);backdrop-filter:blur(12px);
  border:1px solid #21262d;border-radius:12px;padding:14px;width:260px;
}
.controls h3{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:#8b949e;margin-bottom:10px;font-weight:600}
.view-toggle{display:flex;gap:3px;margin-bottom:12px;background:#161b22;border-radius:8px;padding:3px}
.view-btn{flex:1;padding:5px 0;border:none;border-radius:6px;background:transparent;color:#8b949e;font-size:11px;cursor:pointer;font-weight:500;transition:all .2s}
.view-btn.active{background:#21262d;color:#f0f6fc}
.filter-group{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;border-radius:20px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:11px;cursor:pointer;transition:all .2s;font-weight:500}
.filter-btn:hover{border-color:#58a6ff;color:#c9d1d9}
.filter-btn.active{color:#fff;border-color:transparent}
.filter-btn.active.risk-btn{background:#f85149}
.filter-btn.active.safe-btn{background:#3fb950}
.filter-btn.active.all-btn{background:#58a6ff}
.place-filter{display:flex;align-items:center;gap:7px;padding:4px 0;cursor:pointer;font-size:11px;color:#c9d1d9}
.place-filter input{accent-color:#58a6ff;cursor:pointer}
.place-filter .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.place-filter .count{margin-left:auto;color:#8b949e;font-size:10px}
.slider-group{margin-top:8px}
.slider-label{display:flex;justify-content:space-between;font-size:10px;color:#8b949e;margin-bottom:5px}
.slider-label span{color:#d2a8ff;font-weight:600}
input[type="range"]{width:100%;height:4px;-webkit-appearance:none;background:#21262d;border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;background:#d2a8ff;border-radius:50%;cursor:pointer}
.legend{margin-top:12px;padding-top:12px;border-top:1px solid #21262d}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:#8b949e;margin-bottom:5px}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.deck-tooltip{
  position:absolute;z-index:200;pointer-events:none;
  background:rgba(13,17,23,0.96)!important;backdrop-filter:blur(12px);
  border:1px solid #30363d!important;border-radius:10px!important;
  padding:12px 14px!important;max-width:320px;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);font-family:'Segoe UI',system-ui,sans-serif;
}
.tt-header{font-size:13px;font-weight:600;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.tt-badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.tt-risk{background:rgba(248,81,73,0.2);color:#f85149}
.tt-safe{background:rgba(63,185,80,0.2);color:#3fb950}
.tt-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0;font-size:11px}
.tt-label{color:#8b949e}
.tt-value{color:#f0f6fc;font-weight:500;text-align:right;max-width:180px}
.tt-divider{border-top:1px solid #21262d;margin:5px 0}
.tt-places{margin-top:5px;padding:7px 9px;background:rgba(63,185,80,0.08);border-radius:6px;border:1px solid rgba(63,185,80,0.15)}
.tt-places-title{font-size:9px;color:#3fb950;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.tt-place-name{font-size:11px;color:#c9d1d9;padding:1px 0}
</style>
</head>
<body>

<div class="header">
  <h1>Long Stoppage <span>Intelligence</span> Dashboard</h1>
  <div class="kpi-strip">
    <div class="kpi kpi-total"><div class="kpi-value" id="kpi-total">-</div><div class="kpi-label">Total Clusters</div></div>
    <div class="kpi kpi-risk"><div class="kpi-value" id="kpi-risk">-</div><div class="kpi-label">Unidentified Risk</div></div>
    <div class="kpi kpi-safe"><div class="kpi-value" id="kpi-safe">-</div><div class="kpi-label">Identified Safe</div></div>
    <div class="kpi kpi-time"><div class="kpi-value" id="kpi-time">-</div><div class="kpi-label">Avg Stoppage (hrs)</div></div>
  </div>
</div>

<div class="controls">
  <h3>Cluster View</h3>
  <div class="view-toggle">
    <button class="view-btn active" data-view="scatter" onclick="setView('scatter')">Points</button>
    <button class="view-btn" data-view="hex" onclick="setView('hex')">Hexbin</button>
    <button class="view-btn" data-view="heat" onclick="setView('heat')">Heatmap</button>
  </div>

  <h3>Risk Filter</h3>
  <div class="filter-group">
    <button class="filter-btn all-btn active" onclick="setFilter('all')">All</button>
    <button class="filter-btn risk-btn" onclick="setFilter('risk')">Risk</button>
    <button class="filter-btn safe-btn" onclick="setFilter('safe')">Identified</button>
  </div>

  <h3>Place Type</h3>
  <div id="place-filters"></div>

  <div class="slider-group">
    <div class="slider-label">Min Stoppage Time <span id="slider-val">0 hrs</span></div>
    <input type="range" id="stoppage-slider" min="0" max="70" value="0" step="0.5" oninput="onSliderChange(this.value)">
  </div>

  <div class="legend">
    <h3 style="margin-bottom:7px">Legend</h3>
    <div class="legend-item"><div class="legend-dot" style="background:#f85149"></div>Unidentified - Risk</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div>Fuel Station</div>
    <div class="legend-item"><div class="legend-dot" style="background:#58a6ff"></div>Restaurant / Dhaba</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d2a8ff"></div>Toll Booth</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f0883e"></div>Parking</div>
    <div class="legend-item"><div class="legend-dot" style="background:#79c0ff"></div>Industrial Area</div>
    <div class="legend-item"><div class="legend-dot" style="background:#8b949e"></div>Other POI</div>
  </div>
</div>

<div id="map"></div>

":false,"search_radius":1.6,"cluster_id":34}];

let filteredData=ALL_DATA.slice();
let currentFilter='all';
let currentView='scatter';
let minStoppage=0;
let activePlaceTypes=new Set(Object.keys(COLORS));
let deckgl;

buildPlaceFilters();
applyFilters();
initDeck();

function buildPlaceFilters(){
  const c=document.getElementById('place-filters');
  const counts={};
  ALL_DATA.forEach(d=>{counts[d.place_type]=(counts[d.place_type]||0)+1});
  ['Unidentified','Fuel Station','Restaurant / Dhaba','Toll Booth','Parking','Industrial Area','Other POI'].forEach(type=>{
    if(!counts[type])return;
    const l=document.createElement('label');l.className='place-filter';
    l.innerHTML=`<input type="checkbox" checked data-type="${type}" onchange="togglePlaceType('${type}',this.checked)"><span class="dot" style="background:rgb(${COLORS[type].join(',')})"></span>${type}<span class="count">${counts[type]}</span>`;
    c.appendChild(l);
  });
}

function togglePlaceType(t,ch){if(ch)activePlaceTypes.add(t);else activePlaceTypes.delete(t);applyFilters();renderLayers()}
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.${f==='all'?'all':f==='risk'?'risk':'safe'}-btn`).classList.add('active');
  applyFilters();renderLayers();
}
function setView(v){
  currentView=v;
  document.querySelectorAll('.view-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-view="${v}"]`).classList.add('active');
  renderLayers();
}
function onSliderChange(v){minStoppage=parseFloat(v);document.getElementById('slider-val').textContent=v+' hrs';applyFilters();renderLayers()}

function applyFilters(){
  filteredData=ALL_DATA.filter(d=>{
    if(currentFilter==='risk'&&!d.is_risk)return false;
    if(currentFilter==='safe'&&d.is_risk)return false;
    if(!activePlaceTypes.has(d.place_type))return false;
    if(d.stoppage_hrs<minStoppage)return false;
    return true;
  });
  updateKPIs();
}

function updateKPIs(){
  const t=filteredData.length,r=filteredData.filter(d=>d.is_risk).length,s=t-r;
  const wt=filteredData.filter(d=>d.stoppage_hrs>0);
  const avg=wt.length?(wt.reduce((a,d)=>a+d.stoppage_hrs,0)/wt.length).toFixed(1):'-';
  document.getElementById('kpi-total').textContent=t;
  document.getElementById('kpi-risk').textContent=r;
  document.getElementById('kpi-safe').textContent=s;
  document.getElementById('kpi-time').textContent=avg;
}

function getTooltip({object}){
  if(!object)return null;
  if(object.points){
    const pts=object.points.map(p=>p.source);
    const rc=pts.filter(d=>d.is_risk).length;
    return{html:`<div class="tt-header">${pts.length} Clusters in Hex</div><div class="tt-row"><span class="tt-label">Risk</span><span class="tt-value" style="color:#f85149">${rc}</span></div><div class="tt-row"><span class="tt-label">Identified</span><span class="tt-value" style="color:#3fb950">${pts.length-rc}</span></div>`,className:'deck-tooltip'};
  }
  const d=object;
  const badge=d.is_risk?'<span class="tt-badge tt-risk">RISK</span>':'<span class="tt-badge tt-safe">IDENTIFIED</span>';
  let ph='';
  if(d.place_names){
    const names=d.place_names.split(' | ');
    ph=`<div class="tt-places"><div class="tt-places-title">Nearby (${d.search_radius}km)</div>${names.map(n=>`<div class="tt-place-name">${n}</div>`).join('')}</div>`;
  }
  return{html:`
    <div class="tt-header">${badge} ${d.place_type}</div>
    <div class="tt-row"><span class="tt-label">Cluster</span><span class="tt-value">#${d.cluster_id}</span></div>
    <div class="tt-row"><span class="tt-label">Location</span><span class="tt-value">${d.lat}, ${d.lng}</span></div>
    <div class="tt-row"><span class="tt-label">Halts</span><span class="tt-value">${d.halts}</span></div>
    <div class="tt-row"><span class="tt-label">Stoppage</span><span class="tt-value">${d.stoppage_hrs} hrs</span></div>
    <div class="tt-divider"></div>
    <div class="tt-row"><span class="tt-label">Route</span><span class="tt-value">${d.origin||'-'} &rarr; ${d.destination||'-'}</span></div>
    <div class="tt-row"><span class="tt-label">Vehicle</span><span class="tt-value">${d.vehicle}</span></div>
    ${ph}`,className:'deck-tooltip'};
}

function buildLayers(){
  const L=[];
  if(currentView==='scatter'){
    L.push(new deck.ScatterplotLayer({
      id:'scatter',data:filteredData,
      getPosition:d=>[d.lng,d.lat],
      getFillColor:d=>[...COLORS[d.place_type],200],
      getRadius:d=>Math.max(300,Math.min(d.halts*60,3000)),
      radiusMinPixels:4,radiusMaxPixels:30,
      pickable:true,stroked:true,
      getLineColor:d=>d.is_risk?[248,81,73,255]:[255,255,255,60],
      lineWidthMinPixels:1,
    }));
    L.push(new deck.TextLayer({
      id:'labels',data:filteredData.filter(d=>d.is_risk),
      getPosition:d=>[d.lng,d.lat],
      getText:d=>'RISK',getSize:10,
      getColor:[248,81,73,220],getAngle:0,
      getTextAnchor:'middle',getAlignmentBaseline:'top',
      getPixelOffset:[0,14],fontWeight:700,
    }));
  }
  if(currentView==='hex'){
    L.push(new deck.HexagonLayer({
      id:'hex',data:filteredData,
      getPosition:d=>[d.lng,d.lat],
      getColorWeight:d=>d.is_risk?2:0.5,colorAggregation:'SUM',
      colorRange:[[63,185,80],[88,166,255],[210,168,255],[240,136,62],[248,81,73],[200,30,30]],
      elevationRange:[0,5000],elevationScale:50,extruded:true,
      radius:8000,pickable:true,opacity:0.85,coverage:0.9,
      getElevationWeight:d=>d.halts,
    }));
  }
  if(currentView==='heat'){
    L.push(new deck.HeatmapLayer({
      id:'heat',data:filteredData,
      getPosition:d=>[d.lng,d.lat],
      getWeight:d=>d.is_risk?d.halts*3:d.halts,
      radiusPixels:40,intensity:1.5,threshold:0.1,
      colorRange:[[63,185,80,80],[88,166,255,120],[210,168,255,160],[240,136,62,200],[248,81,73,230],[200,30,30,255]],
    }));
    L.push(new deck.ScatterplotLayer({
      id:'heat-dots',data:filteredData.filter(d=>d.is_risk),
      getPosition:d=>[d.lng,d.lat],
      getFillColor:[248,81,73,180],getRadius:500,
      radiusMinPixels:3,radiusMaxPixels:8,pickable:true,
    }));
  }
  return L;
}

function renderLayers(){if(deckgl)deckgl.setProps({layers:buildLayers()})}

function initDeck(){
  deckgl=new deck.DeckGL({
    container:'map',
    mapStyle:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    initialViewState:{longitude:78.5,latitude:20.5,zoom:5,pitch:25,bearing:0},
    controller:true,layers:buildLayers(),getTooltip,
  });
}
</script>
